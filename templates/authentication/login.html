{% extends 'base.html' %}

{% block title %}Login - Voca Help{% endblock %}

{% block content %}
<div class="flex flex-1 items-center justify-center py-4">
    <div class="w-full max-w-md">
        <div class="bg-card rounded-xl border border-border p-6 shadow-sm">
            <div class="mb-6">
                <div class="mb-3 inline-flex rounded-lg px-3 py-1 text-primary" style="background-color: rgba(91, 127, 255, 0.1); font-size:12px; font-weight:500;">
                    Welcome back
                </div>
                <h2 class="text-foreground">Sign In</h2>
                <p class="mt-1 text-muted-foreground" style="font-size:14px;">
                    Continue building your vocabulary streak.
                </p>
            </div>

            <form method="post" class="space-y-4">
                {% csrf_token %}

                <div>
                    <label for="id_username" class="block text-foreground" style="font-size:14px;">Username</label>
                    <input
                        type="text"
                        name="username"
                        id="id_username"
                        required
                        class="mt-1 block w-full rounded-lg border border-input bg-input-background px-3 py-2.5 text-foreground focus:outline-none focus:ring-2 focus:ring-primary"
                        style="font-size:14px;"
                        placeholder="Enter your username"
                    >
                </div>

                <div>
                    <label for="id_password" class="block text-foreground" style="font-size:14px;">Password</label>
                    <input
                        type="password"
                        name="password"
                        id="id_password"
                        required
                        class="mt-1 block w-full rounded-lg border border-input bg-input-background px-3 py-2.5 text-foreground focus:outline-none focus:ring-2 focus:ring-primary"
                        style="font-size:14px;"
                        placeholder="Enter your password"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full rounded-lg bg-primary px-4 py-2.5 text-primary-foreground transition-opacity hover:opacity-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
                    style="font-size:14px; font-weight:500;"
                >
                    Sign In
                </button>
            </form>

            <div class="mt-6 border-t border-border pt-5 text-center">
                <p class="text-muted-foreground" style="font-size:14px;">
                    New to Voca Help?
                    <a href="{% url 'authentication:register' %}" class="font-medium text-primary hover:opacity-80">Create an account</a>
                </p>
                <a href="{% url 'home' %}" class="mt-3 inline-block text-muted-foreground hover:text-foreground" style="font-size:14px;">Back to Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block footer %}{% endblock %}
