{% extends 'base.html' %}

{% block title %}Practice {{ topic.title }} - Vocab Buddy{% endblock %}

{% block content %}
<div class="mx-auto w-full max-w-3xl rounded-lg border border-border bg-card p-5 shadow-sm">
    <h1 class="text-xl font-semibold text-foreground">{{ topic.title }}</h1>
    <p class="mt-2 text-muted-foreground" style="font-size:14px;">No exercises have been added for this topic yet.</p>
    <a href="{% url 'grammar:topic_detail' topic.slug %}" class="mt-4 inline-flex rounded-lg bg-primary px-4 py-2 text-white hover:opacity-95" style="font-size:14px; font-weight:500;">Back to Topic</a>
</div>
{% endblock %}
